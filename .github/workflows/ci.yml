name: iOS CI

on:
  pull_request:
    paths:
      - 'ios/**'
      - '.github/workflows/ci.yml'

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        working-directory: ios
        run: swiftlint --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: ios/SourcePackages
          key: ${{ runner.os }}-spm-${{ hashFiles('ios/VoiLog.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ios/VoiLog.xcodeproj \
            -scheme VoiLogTests \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -clonedSourcePackagesDirPath ios/SourcePackages \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: ios-test-results
          path: ~/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult

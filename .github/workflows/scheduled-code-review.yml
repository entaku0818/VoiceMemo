name: Scheduled Code Review

on:
  schedule:
    - cron: '0 0 * * 1'  # 毎週月曜 9:00 JST
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  code-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 50

      - name: Create label if not exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "automated-review" --color "ededed" --description "自動コードレビューで作成" 2>/dev/null || true

      - name: Parallel Code Review & Issue Creation
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          direct_prompt: |
            あなたはコードレビューの専門家チームです。
            直近のmainブランチの変更を5つの観点で並列レビューし、
            問題があればGitHub Issueを作成してください。

            ## ステップ1: 変更内容の把握

            以下を実行して直近の変更を確認してください：
            ```
            git log --oneline -20
            git diff HEAD~10..HEAD --stat
            ```

            ## ステップ2: 並列レビュー（5エージェント同時実行）

            Taskツールを使って以下5つを並列実行してください：

            **task: code-quality-reviewer**
            - コード品質・可読性・保守性の問題を検出
            - 重複コード、長すぎる関数、命名規則の不統一
            - 問題があれば gh issue create でIssueを作成

            **task: performance-reviewer**
            - パフォーマンス問題を検出
            - 不要なループ、メモリリーク、非効率なDB/APIアクセス
            - 問題があれば gh issue create でIssueを作成

            **task: security-reviewer**
            - セキュリティ脆弱性を検出
            - ハードコードされた認証情報、インジェクション脆弱性、権限不備
            - 問題があれば gh issue create でIssueを作成

            **task: test-coverage-reviewer**
            - テスト不足の箇所を検出
            - テストのない新機能、エッジケースの欠如
            - 問題があれば gh issue create でIssueを作成

            **task: documentation-reviewer**
            - ドキュメント不備を検出
            - 未ドキュメントのpublic API、README更新漏れ
            - 問題があれば gh issue create でIssueを作成

            ## ステップ3: Issue作成フォーマット

            各エージェントは以下の形式でIssueを作成してください：

            ```
            gh issue create \
              --title "[AutoReview] <カテゴリ>: <問題の概要>" \
              --label "automated-review" \
              --body "## 問題の説明
            （具体的な説明）

            ## 該当箇所
            ファイル: \`path/to/file.swift\`

            ## 改善提案
            （具体的な改善方法）

            ---
            *このIssueは週次自動コードレビューにより生成されました*"
            ```

            **重要**: 問題がない場合はIssueを作成しないでください。
            明らかな問題のみ起票し、軽微なスタイル指摘は無視してください。
